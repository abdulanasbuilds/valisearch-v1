<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" 
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com;

      ">

    <link rel="canonical" href="https://valisearch.app/" />

    <!-- Favicon -->

    <meta property="og:title" content="VALISEARCH — AI Startup Intelligence" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="VALISEARCH — AI Startup Validation" />
    <meta name="twitter:description" content="Validate your startup idea in 30 seconds with AI-powered market analysis, competitor research, and execution-ready insights." />
    <meta name="twitter:image" content="https://valisearch.app/favicon.png" />

    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
